<!DOCTYPE html>
<html lang="en">
<head>
    <title>Voice Email Assistant — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --void: #050510;
            --deep: #0a0a2e;
            --accent1: #6c63ff;
            --accent2: #00d4ff;
            --accent3: #ff6584;
            --glass-bg: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.12);
            --text: #e8e8f0;
            --muted: rgba(232,232,240,0.5);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'DM Sans', sans-serif;
            background: var(--void);
            color: var(--text);
        }

        /* ── Aurora background ── */
        .aurora {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(108,99,255,0.35) 0%, transparent 70%),
                        radial-gradient(ellipse 60% 70% at 80% 70%, rgba(0,212,255,0.25) 0%, transparent 70%),
                        radial-gradient(ellipse 50% 50% at 50% 10%, rgba(255,101,132,0.2) 0%, transparent 70%),
                        #050510;
            animation: auroraShift 12s ease-in-out infinite alternate;
        }

        @keyframes auroraShift {
            0%   { filter: hue-rotate(0deg) brightness(1); }
            50%  { filter: hue-rotate(20deg) brightness(1.1); }
            100% { filter: hue-rotate(-15deg) brightness(0.95); }
        }

        /* Noise overlay */
        .aurora::after {
            content: '';
            position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat var(--dur, 10s) ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }
        .orb1 { width:400px; height:400px; background: rgba(108,99,255,0.25); top:-100px; left:-100px; --dur:9s; }
        .orb2 { width:500px; height:500px; background: rgba(0,212,255,0.15); bottom:-150px; right:-100px; --dur:13s; animation-delay:-4s; }
        .orb3 { width:250px; height:250px; background: rgba(255,101,132,0.2); top:50%; left:60%; --dur:8s; animation-delay:-2s; }

        @keyframes orbFloat {
            0%   { transform: translate(0,0) scale(1); }
            100% { transform: translate(30px, 40px) scale(1.08); }
        }

        /* ── Layout ── */
        .stage {
            position: relative; z-index: 1;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* ── Card ── */
        .card {
            width: 420px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 52px 44px 48px;
            backdrop-filter: blur(24px) saturate(160%);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset;
            animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity:0; transform: translateY(30px) scale(0.97); }
            to   { opacity:1; transform: none; }
        }

        /* ── Mic pulse ── */
        .mic-wrap {
            display: flex; justify-content: center; margin-bottom: 28px;
        }
        .mic-ring {
            position: relative;
            width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
        }
        .mic-ring::before, .mic-ring::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 2px solid var(--accent1);
            animation: pulse 2.5s ease-out infinite;
        }
        .mic-ring::after { animation-delay: 1.25s; }
        @keyframes pulse {
            0%   { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        .mic-icon {
            font-size: 36px;
            filter: drop-shadow(0 0 14px rgba(108,99,255,0.9));
            animation: iconGlow 2s ease-in-out infinite alternate;
            z-index: 1;
        }
        @keyframes iconGlow {
            from { filter: drop-shadow(0 0 8px rgba(108,99,255,0.7)); }
            to   { filter: drop-shadow(0 0 22px rgba(0,212,255,0.9)); }
        }

        /* ── Typography ── */
        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .tagline {
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 38px;
        }

        /* ── Divider ── */
        .divider {
            display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border));
        }
        .divider::after { transform: scaleX(-1); }
        .divider span { font-size: 11px; color: var(--muted); white-space: nowrap; }

        /* ── Google button ── */
        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 14px 20px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative; overflow: hidden;
        }
        .btn-google::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(108,99,255,0.3), rgba(0,212,255,0.2));
            opacity: 0;
            transition: opacity 0.25s;
        }
        .btn-google:hover::before { opacity: 1; }
        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(108,99,255,0.35);
            border-color: rgba(108,99,255,0.5);
            color: #fff;
        }
        .btn-google:active { transform: translateY(0); }
        .btn-google svg { flex-shrink: 0; z-index: 1; }
        .btn-google span { z-index: 1; }

        /* ── Footer ── */
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
        }
        .footer-text a {
            color: var(--accent2);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .footer-text a:hover { opacity: 0.75; }

        /* ── Pills ── */
        .pills {
            display: flex; justify-content: center; gap: 8px; margin-bottom: 32px;
        }
        .pill {
            font-size: 11px; padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="aurora"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="stage">
    <div class="card">
        <div class="mic-wrap">
            <div class="mic-ring">
                <span class="mic-icon">🎙️</span>
            </div>
        </div>

        <h1 class="card-title">Voice Email Assistant</h1>

        <div class="pills">
            <span class="pill">Smart</span>
            <span class="pill">Secure</span>
            <span class="pill">Voice Controlled</span>
        </div>

        <div class="divider"><span>Sign in to continue</span></div>

        <a href="/login" class="btn-google">
            <!-- Google G logo -->
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#EA4335" d="M5.27 9.76A7.08 7.08 0 0 1 19.07 12c0 .68-.1 1.33-.26 1.97H12v-3.73h7.44a10.95 10.95 0 0 0-1.43-5.24"/>
                <path fill="#4285F4" d="M12 22a10 10 0 0 0 6.95-2.81l-3.4-2.64A6 6 0 0 1 6.23 14H2.65A10 10 0 0 0 12 22z"/>
                <path fill="#FBBC05" d="M6.23 14a6.02 6.02 0 0 1 0-4l-3.58-2.77A10.02 10.02 0 0 0 2 12c0 1.64.4 3.18 1.09 4.55L6.23 14z"/>
                <path fill="#34A853" d="M12 6c1.67 0 3.17.58 4.35 1.54l3.24-3.24A10 10 0 0 0 2.65 9.23L6.23 10a6 6 0 0 1 5.77-4z"/>
            </svg>
            <span>Continue with Google</span>
        </a>

        <div class="footer-text">
            New here? <a href="/signup">Create an account</a>
        </div>
    </div>
</div>

</body>
</html>
