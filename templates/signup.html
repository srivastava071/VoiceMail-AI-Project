<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Voice Email Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .signup-card {
            background: white;
            padding: 45px;
            border-radius: 18px;
            width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .signup-btn {
            background: linear-gradient(135deg, #4e73df, #224abe);
            color: white;
            font-weight: 600;
            border-radius: 30px;
            padding: 12px;
            transition: 0.3s;
        }

        .signup-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(78,115,223,0.4);
        }
    </style>
</head>

<body>

<div class="signup-card">
    <h2 class="mb-3">Create Account</h2>
    <p class="text-muted">Join the Voice Email Assistant</p>

    <a href="/login" class="btn signup-btn w-100 mt-4">
        🔐 Sign Up with Google
    </a>

    <p class="mt-3">
        Already have an account? 
        <a href="/">Login</a>
    </p>
</div>

</body>
</html>
